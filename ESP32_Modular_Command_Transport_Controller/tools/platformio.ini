; Optional PlatformIO build configuration.
; Run from the project root:
;   pio run -c tools/platformio.ini
;   pio run -c tools/platformio.ini -t upload
;
; The Arduino IDE remains straightforward after installing the two ESP32Async
; libraries listed in docs/PROJECT_GUIDE.md.

[platformio]
src_dir = ..
include_dir = ../src

[env:lolin32]
platform = espressif32
board = lolin32
framework = arduino
monitor_speed = 115200
lib_deps =
  ESP32Async/AsyncTCP @ 3.4.10
  ESP32Async/ESPAsyncWebServer @ 3.11.2
build_flags =
  -DCORE_DEBUG_LEVEL=0
  -Os
  -DCONFIG_ASYNC_TCP_RUNNING_CORE=1
  -DCONFIG_ASYNC_TCP_STACK_SIZE=8192
build_src_filter =
  +<ESP32_Modular_Command_Transport_Controller.ino>
  +<src/**/*.cpp>
  -<docs/>
  -<tools/>
  -<web/>
